<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e94560"/>
      <stop offset="1" stop-color="#533483"/>
    </linearGradient>
  </defs>
  <!-- pencil rotated 45°, pointing to bottom-left -->
  <g transform="rotate(45 32 32)">
    <!-- eraser -->
    <rect x="26" y="8" width="12" height="7" rx="2" fill="#f4b8c4"/>
    <!-- ferrule (metal band) -->
    <rect x="26" y="14" width="12" height="4" fill="#c0c0d0"/>
    <!-- body -->
    <rect x="26" y="18" width="12" height="28" fill="url(#body)"/>
    <!-- wooden tip -->
    <path d="M26 46 L38 46 L32 56 Z" fill="#e8c89a"/>
    <!-- graphite point -->
    <path d="M30 52 L34 52 L32 56 Z" fill="#16213e"/>
  </g>
</svg>
